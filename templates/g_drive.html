{% extends "base.html" %}
{% block title %}파일 · 이후 도구{% endblock %}
{% block content %}
<section class="app-heading">
  <div><h1>파일</h1></div>
  <div id="drive-capability" class="status-pill">연결 확인 중</div>
</section>

<section class="toolbar" aria-label="파일 도구">
  <button id="go-up" type="button">↑ 상위</button>
  <button id="go-root" type="button">내 폴더</button>
  <label class="search-box"><span class="sr-only">파일 검색</span><input id="drive-search" type="search" placeholder="파일명 검색"></label>
  <button id="search-button" type="button">검색</button>
  <button id="refresh-drive" type="button">새로고침</button>
  <div class="write-actions" data-write-only hidden>
    <button id="new-folder" type="button">새 폴더</button>
    <label class="file-upload">업로드<input id="file-upload" type="file" multiple hidden></label>
  </div>
</section>

<nav id="breadcrumb" class="breadcrumb" aria-label="현재 폴더"></nav>
<p class="muted" data-write-only hidden>파일을 현재 경로 또는 폴더에 끌어 놓아 업로드할 수 있습니다.</p>
<div id="drive-message" class="inline-message" role="status" aria-live="polite"></div>
<section class="file-panel" aria-labelledby="file-list-title">
  <h2 id="file-list-title" class="sr-only">파일 목록</h2>
  <div class="file-head" aria-hidden="true"><span>이름</span><span>유형</span><span>수정일</span><span>크기</span><span>작업</span></div>
  <div id="file-list" class="file-list"><div class="empty-state">불러오는 중…</div></div>
</section>
{% endblock %}
{% block scripts %}<script src="{{ url_for('static', filename='gdrive.js') }}" defer></script>{% endblock %}
