{% extends "base.html" %}
{% block title %}비밀번호 변경 · 이후 도구{% endblock %}
{% block content %}
<section class="auth-card" aria-labelledby="password-title">
  <p class="eyebrow">ACCOUNT SECURITY</p>
  <h1 id="password-title">{% if current_user['must_change_password'] %}초기 비밀번호 변경{% else %}비밀번호 변경{% endif %}</h1>
  <p class="muted">영문과 숫자를 포함한 10자 이상의 새 비밀번호를 사용하세요.</p>
  <form method="post" class="stack-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label for="current-password">현재 비밀번호</label>
    <input id="current-password" name="current_password" type="password" autocomplete="current-password" required>
    <label for="new-password">새 비밀번호</label>
    <input id="new-password" name="new_password" type="password" minlength="10" autocomplete="new-password" required>
    <label for="confirm-password">새 비밀번호 확인</label>
    <input id="confirm-password" name="confirm_password" type="password" minlength="10" autocomplete="new-password" required>
    <button class="primary-button" type="submit">비밀번호 변경</button>
  </form>
</section>
{% endblock %}
