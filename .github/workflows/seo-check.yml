name: SEO Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 매주 월요일 00:00 UTC (한국 월요일 09:00) 자동 실행
    - cron: "0 0 * * 1"
  workflow_dispatch:   # 수동 실행 버튼

jobs:
  test:
    name: 테스트 (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: 테스트 실행
        run: pytest -q

  seo-report:
    name: SEO 분석 리포트 생성
    needs: test
    # 스케줄/수동 실행 시에만 실제 네이버/홈페이지 분석 수행
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: SEO 분석 실행 (실패해도 워크플로 중단 안 함)
        run: python main.py --output-dir ./reports || true
      - name: 리포트 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: seo-report
          path: reports/
          if-no-files-found: ignore
          retention-days: 30
