name: Deploy to OCI

# main에 push되면 OCI 우분투 서버(Docker)로 자동 재배포.
# 필요 시크릿(Settings → Secrets and variables → Actions):
#   OCI_SSH_HOST   : OCI 서버 IP/호스트
#   OCI_SSH_USER   : SSH 사용자 (예: ubuntu)
#   OCI_SSH_KEY    : SSH 개인키(전체, -----BEGIN ... END-----)
#   OCI_SSH_PORT   : (선택) SSH 포트, 기본 22
#   OCI_APP_DIR    : (선택) 앱 경로. 미설정 시 /opt/<레포명> 으로 자동 결정.
#                    → 레포마다 다른 값이라 조직 공유 시크릿으로 넣지 말 것.
# 시크릿 미설정 시 배포 단계는 건너뛰고 워크플로는 성공(green)으로 종료.
#
# ※ 이 워크플로는 레포 비종속(generic)이라, 신규 레포에 이 파일만 복사하고
#   OCI_SSH_HOST/USER/KEY 만 등록하면 /opt/<레포명> 으로 자동 배포된다.

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

concurrency:
  group: deploy-oci
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check OCI secrets configured
        id: chk
        env:
          H: ${{ secrets.OCI_SSH_HOST }}
          K: ${{ secrets.OCI_SSH_KEY }}
        run: |
          if [ -n "$H" ] && [ -n "$K" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::OCI 배포 시크릿(OCI_SSH_HOST/OCI_SSH_KEY) 미설정 — 배포 건너뜀. 등록 시 push마다 자동 배포됩니다."
          fi

      - name: SSH deploy (git pull + 도커 재빌드/재실행 + 분석 갱신)
        if: steps.chk.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.OCI_SSH_HOST }}
          username: ${{ secrets.OCI_SSH_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          port: ${{ secrets.OCI_SSH_PORT || '22' }}
          command_timeout: 20m
          script: |
            set -e
            APP_DIR="${{ secrets.OCI_APP_DIR }}"
            APP_DIR="${APP_DIR:-/opt/${{ github.event.repository.name }}}"
            echo "▶ deploy to $APP_DIR"
            cd "$APP_DIR"
            # repo가 root 소유로 clone된 경우 보정 (OCI ubuntu는 무비번 sudo)
            sudo -n chown -R "$(id -un):$(id -gn)" "$APP_DIR" 2>/dev/null || true
            git config --global --add safe.directory "$APP_DIR" 2>/dev/null || true
            git fetch --all --prune
            git reset --hard origin/main
            bash deploy/run-docker.sh
            # 새 코드로 컨테이너가 뜬 뒤, 새 정보 소스가 카드에 보이도록 분석 1회 트리거
            echo "▶ 분석 갱신 트리거 (/refresh)"
            sleep 3
            sudo docker exec seoblue0342 curl -fsS -X POST http://127.0.0.1:8842/refresh || true
            echo "✅ OCI 재배포 완료 (분석은 백그라운드로 1~2분 내 갱신)"
